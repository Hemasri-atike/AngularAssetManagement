<div class="p-6">

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row justify-between mb-6 gap-4">
    
    <div>
      <h2 class="text-3xl font-bold">Asset Management</h2>
      <p class="text-gray-500 text-sm">Manage your assets</p>
    </div>

    <div class="flex gap-3 items-center">
      
      <!-- Search -->
      <input
        [(ngModel)]="search"
        (input)="handleSearch()"
        placeholder="Search assets..."
        class="px-4 py-2 border rounded-lg shadow-sm"
      />

      <!-- Add Button -->
      <button
        class="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center gap-2">
        ➕ Add
      </button>

    </div>
  </div>

  <!-- TABLE -->
  <div class="bg-white shadow rounded-xl overflow-auto">

    <table mat-table [dataSource]="filteredData" class="min-w-full">

      <!-- Dynamic Columns -->
      <ng-container *ngFor="let col of allColumns" [matColumnDef]="col">
        <th mat-header-cell *matHeaderCellDef class="font-bold">
          {{ col }}
        </th>
        <td mat-cell *matCellDef="let element">
          {{ element[col] || '-' }}
        </td>
      </ng-container>

      <!-- ACTIONS -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">

          <button class="text-blue-600 mr-2">
            <mat-icon>edit</mat-icon>
          </button>

          <button
            class="text-red-600"
            (click)="deleteAsset(element.id)">
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <!-- HEADER -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- ROW -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

  </div>

</div>
